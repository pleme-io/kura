# Build + publish `kura-run` binaries for macOS and Linux on every tag push
# and via manual dispatch.
#
# Runners:
#   - macos-14           → aarch64-darwin (Apple Silicon)
#   - ubuntu-24.04       → x86_64-linux (glibc)
#   - ubuntu-24.04-arm   → aarch64-linux (glibc)
name: release

on:
  push:
    tags: ["kura-run-v*"]
  workflow_dispatch: {}

jobs:
  build:
    name: ${{ matrix.slug }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: darwin-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
          - slug: linux-x86_64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - slug: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            kura
            kura/kura-run
            kura/Cargo.toml
            kura/Cargo.lock
            kura/flake.nix
          sparse-checkout-cone-mode: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-kura-run-${{ matrix.slug }}-${{ hashFiles('kura/Cargo.lock') }}
          restore-keys: cargo-kura-run-${{ matrix.slug }}-

      - name: Build release
        run: |
          cd kura
          cargo build --release --bin kura-run \
            --package kura-run \
            --target ${{ matrix.rust_target }}
          cp target/${{ matrix.rust_target }}/release/kura-run ../kura-run-${{ matrix.slug }}
          shasum -a 256 kura-run-${{ matrix.slug }} > kura-run-${{ matrix.slug }}.sha256

      - name: Sanity-check the binary
        run: |
          ./kura-run-${{ matrix.slug }} --help > /dev/null

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: kura-run-${{ matrix.slug }}
          path: |
            kura-run-${{ matrix.slug }}
            kura-run-${{ matrix.slug }}.sha256
          retention-days: 90

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/kura-run-v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artefact tree
        run: |
          mkdir -p release
          find dist -type f \( -name 'kura-run-*' -o -name 'kura-run-*.sha256' \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true