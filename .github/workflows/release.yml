name: release

on:
  push:
    tags: ["kura-v*"]
  workflow_dispatch: {}

jobs:
  build:
    name: ${{ matrix.slug }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - slug: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          cargo build --release -p kura-run --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/kura-run ./kura-${{ matrix.slug }}
          shasum -a 256 kura-${{ matrix.slug }} > kura-${{ matrix.slug }}.sha256

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kura-${{ matrix.slug }}
          path: kura-${{ matrix.slug }}*
          retention-days: 90

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/kura-*